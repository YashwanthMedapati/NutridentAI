name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend-tests:
    name: Backend tests (Python)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: Caries
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: Caries/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt ruff

      - name: Lint
        run: ruff check .

      - name: Run backend test suite
        run: python -m unittest test_core test_endpoints -v

  frontend-tests:
    name: Frontend tests (Vitest)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: caries-frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: caries-frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Run frontend test suite
        run: npm test

      - name: Build production bundle
        run: npm run build
